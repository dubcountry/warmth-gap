name: Refresh Eurostat data

# Optional. Regenerates public/data/thermal_data.json and commits it.
# Eurostat annual indicators update through spring, so once a year is plenty.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 3 *'   # 06:00 UTC on 1 March

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/eurostat_pull.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/thermal_data.json
          git diff --staged --quiet || git commit -m "data: refresh Eurostat pull"
          git push
